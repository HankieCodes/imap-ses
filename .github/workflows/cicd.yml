name: imap-ses-cicd

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      - name: Install and Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export tag=${GITHUB_REF_NAME}-${GITHUB_SHA:0:7}
          
          corepack enable pnpm
          echo $GITHUB_TOKEN | docker login ghcr.io -u hankiecodes --password-stdin
          pnpm install
          pushd imap
          
          pnpm run build
          docker build -t ghcr.io/hankiecodes/imap-ses:${tag} .

          docker push ghcr.io/hankiecodes/imap-ses:${tag}
          
          docker tag ghcr.io/hankiecodes/imap-ses:${tag} ghcr.io/hankiecodes/imap-ses:${GITHUB_REF_NAME}
          docker push ghcr.io/hankiecodes/imap-ses:${GITHUB_REF_NAME}
          
          if [ "${GITHUB_REF_NAME}" == "master" ]; then
            docker tag ghcr.io/hankiecodes/imap-ses:${tag} ghcr.io/hankiecodes/imap-ses:latest
            docker push ghcr.io/hankiecodes/imap-ses:latest
          fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            package.json
      - name: Deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export tag=v$(cat package.json | jq -r '.version')
          export built_tag=${GITHUB_REF_NAME}-${GITHUB_SHA:0:7}
          
          echo $GITHUB_TOKEN | docker login ghcr.io -u hankiecodes --password-stdin
          
          export IS_PRERELEASE=$(case "$tag" in *rc*) printf 'true';; esac)
          
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$tag" \
              ${IS_PRERELEASE:+"--prerelease"} \
              --generate-notes
          
          docker pull ${built_tag}
          docker tag ${built_tag} ghcr.io/hankiecodes/imap-ses:${tag}
          docker push ghcr.io/hankiecodes/imap-ses:${tag}
